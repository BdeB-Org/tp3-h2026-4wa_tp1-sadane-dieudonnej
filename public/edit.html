<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Modifier un projet</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container" style="max-width: 700px;">

        <!-- ---------------Edgar------------------- -->
        <!-- Barre du haut avec retour et déconnexion -->
        <div class="topbar">
            <div>
                <h1>Modifier un projet</h1>
            </div>
            <div class="actions">
                <a class="btn-link secondary" href="/index.html">Retour à la liste</a>
                <button class="secondary" onclick="logout()">Déconnexion</button>
            </div>
        </div>

        <!-- Zone pour afficher les messages -->
        <div id="message"></div>

        <!-- ---------------Edgar------------------- -->
        <!-- Formulaire de modification — prérempli par JavaScript via l'ID dans l'URL -->
        <form id="formEdit">
            <input type="text" id="titre" placeholder="Titre du projet" required>
            <input type="text" id="description" placeholder="Description" required>
            <input type="date" id="date_projet" required>
            <input type="number" id="id_etudiant" placeholder="ID Étudiant" required>
            <input type="number" id="id_cours" placeholder="ID Cours" required>
            <button type="submit">Enregistrer les modifications</button>
        </form>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/edit.js"></script>
</body>
</html>
