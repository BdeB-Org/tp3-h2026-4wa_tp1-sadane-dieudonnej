<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Modifier un étudiant</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container" style="max-width: 700px;">

        <!-- ---------------Jorenso------------------- -->
        <!-- Barre du haut avec retour et déconnexion -->
        <div class="topbar">
            <div>
                <h1>Modifier un étudiant</h1>
            </div>
            <div class="actions">
                <a class="btn-link secondary" href="/etudiants.html">Retour à la liste</a>
                <button class="secondary" onclick="logout()">Déconnexion</button>
            </div>
        </div>

        <!-- Zone pour afficher les messages -->
        <div id="message"></div>

        <!-- ---------------Jorenso------------------- -->
        <!-- Formulaire prérempli automatiquement par JavaScript via l'ID dans l'URL -->
        <form id="formEdit">
            <input type="text" id="nom" placeholder="Nom" required>
            <input type="text" id="prenom" placeholder="Prénom">
            <input type="email" id="email" placeholder="Email">
            <input type="text" id="programme" placeholder="Programme" required>
            <button type="submit">Enregistrer les modifications</button>
        </form>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/edit-etudiant.js"></script>
</body>
</html>
